name: Update results

# Grades predictions against live scores and commits the result, which
# triggers a Vercel redeploy. Hands-off — no manual JSON edits.

on:
  schedule:
    - cron: '0 */3 * * *' # every 3 hours
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Archive picks, fetch scores, grade
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          WC_LEAGUE_ID: '1'
          WC_SEASON: '2026'
        run: node scripts/update-results.mjs

      - name: Commit updated data
        run: |
          git config user.name "results-bot"
          git config user.email "actions@users.noreply.github.com"
          git add content/wc_results.json content/placed_picks.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update graded results"
            git push
          fi
